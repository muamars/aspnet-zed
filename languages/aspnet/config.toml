name = "ASP.NET"
grammar = "razor"
path_suffixes = ["cshtml", "razor"]
line_comments = ["// "]
block_comment = ["@*", "*@"]
tab_size = 4
autoclose_before = ";:.,=}])>"
word_characters = ["@", "#"]

brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
  { start = "<", end = ">", close = false, newline = false },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
  { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
  { start = "@{", end = "}", close = true, newline = true },
  { start = "@(", end = ")", close = true, newline = false },
  { start = "<!--", end = "-->", close = true, newline = false },
  { start = "@*", end = "*@", close = true, newline = false },
]
